<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Minimalist Homework Card -->
  <rect x="14" y="16" width="36" height="32" rx="6" fill="#ffffff" filter="url(#cardShadow)"/>
  
  <!-- Subtle line representing text -->
  <line x1="22" y1="24" x2="34" y2="24" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Vibrant checkmark indicating completion/testing -->
  <path d="M25 33 l 4 4 l 10 -10" fill="none" stroke="#0072FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
