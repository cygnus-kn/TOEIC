<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TOEIC Speaking & Writing homework and class notes for students.">
  <title>TOEIC SW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/index.css?v=57">
</head>
<body class="preload">
  <script>
    (function() {
      try {
        var currentTheme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (currentTheme === 'dark' || (!currentTheme && prefersDark)) {
          document.body.classList.add('dark-theme');
        }
      } catch (e) {}
      // Remove preload class after a tick to allow initial styles to apply without transitioning
      setTimeout(function() {
        document.body.classList.remove('preload');
      }, 50);
    })();
  </script>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>
      <div class="sidebar-footer">
        <div id="themeToggle" class="theme-toggle" role="switch" aria-label="Toggle dark mode" tabindex="0">
          <div class="toggle-knob"></div>
          <svg class="toggle-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="toggle-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </div>
      </div>
      <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    </aside>
    <script>
      (function() {
        try {
          var sidebar = document.getElementById('sidebar');
          var savedWidth = localStorage.getItem('sidebarWidth');
          if (savedWidth) sidebar.style.width = savedWidth;
          if (localStorage.getItem('sidebarCollapsed') === 'true') {
            sidebar.classList.add('collapsed');
          }
          sidebar.style.transition = 'none';
        } catch (e) {}
      })();
    </script>

    <!-- Main Content -->
    <main class="main" id="main">
      <div class="main-top-bar">
        <button class="sidebar-toggle-btn" id="sidebarCollapseBtn" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
      </div>

      <div class="layout-top-bar">
        <button class="layout-toggle-btn" id="layoutToggleBtn" aria-label="Toggle layout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <path d="M3 9h18M9 21V9"></path>
          </svg>
        </button>
      </div>

      <!-- Content injected by app.js -->

      <!-- Welcome state -->
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
          </svg>
        </div>
        <p class="welcome-text">Select a homework or lesson from the sidebar</p>
      </div>

      <!-- Homework viewer -->
      <div class="homework-viewer" id="homeworkViewer" style="display: none;">
        <div class="homework-top-zone">
          <button class="card-drag-handle" id="cardDragHandle" type="button" aria-label="Drag card area" title="Drag card area">
            <span class="card-drag-handle-bar"></span>
          </button>

          <div class="homework-meta-row">
            <div class="viewer-header">
              <div class="badge-dropdown">
                <span class="date-badge" id="dateBadge"></span>
                <div id="homeworkDropdown" class="dropdown-menu"></div>
              </div>
            </div>

            <div class="pagination" id="pagination">
              <!-- Dots injected by JS -->
            </div>
          </div>
        </div>

        <div class="card-stage" id="cardStage">
          <div class="card-container" id="cardContainer">
            <div class="card-track" id="cardTrack">
              <!-- Part cards injected by JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Lesson viewer -->
      <div class="lesson-viewer" id="lessonViewer" style="display: none;">
        <div class="viewer-header">
          <div class="badge-dropdown">
            <span class="date-badge" id="lessonDateBadge"></span>
            <div id="lessonDropdown" class="dropdown-menu"></div>
          </div>
        </div>

        <div class="lesson-content" id="lessonContent">
          <!-- Lesson content injected by JS -->
        </div>
      </div>
    </main>
  </div>

  <div class="bottom-recorder-shell" id="bottomRecorderShell" aria-live="polite">
    <div class="bottom-nav" id="bottomNav">
      <!-- Unified Media Player Seeker (Top) -->
      <div class="bottom-playback-seeker-wrapper" id="bottomPlaybackSeeker">
        <div class="bottom-seeker-bar">
          <div class="bottom-seeker-progress" id="bottomSeekerProgress"></div>
          <div class="bottom-seeker-knob" id="bottomSeekerKnob"></div>
        </div>
      </div>

      <!-- Unified Media Player Controls (Bottom) -->
      <div class="bottom-nav-controls">
        <div class="recording-status" id="recordingStatus">
          <span class="recording-status-dot"></span>
          <span id="recordingStatusText">00:00</span>
        </div>
        
        <div class="bottom-nav-btns">
          <button class="bottom-nav-btn" id="bottomRedoBtn" aria-label="Record again" title="Record again">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </button>
          <button class="bottom-nav-btn bottom-nav-btn-primary" id="bottomRecordBtn" aria-label="Record answer" title="Record answer">
            <svg class="record-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 15a4 4 0 0 0 4-4V7a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Z"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <path d="M12 18v3"/>
              <path d="M8.5 21h7"/>
            </svg>
          </button>
          <button class="bottom-nav-btn" id="bottomDeleteBtn" aria-label="Delete latest recording" title="Delete latest recording">
            <svg class="delete-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"/>
              <path d="M8 6V4.8c0-.66.54-1.2 1.2-1.2h5.6c.66 0 1.2.54 1.2 1.2V6"/>
              <path d="M18 6v12.2c0 .99-.81 1.8-1.8 1.8H7.8C6.81 20 6 19.19 6 18.2V6"/>
              <path d="M10 10.2v5.6"/>
              <path d="M14 10.2v5.6"/>
            </svg>
          </button>
          <button class="bottom-nav-btn" id="bottomSaveBtn" aria-label="Save latest recording" title="Save latest recording">
            <svg class="save-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3v12"/>
              <path d="m7 10 5 5 5-5"/>
              <path d="M5 18v1.5A1.5 1.5 0 0 0 6.5 21h11a1.5 1.5 0 0 0 1.5-1.5V18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- Notepad Overlay -->
  <div class="notepad-overlay" id="notepadOverlay">
    <div class="notepad-header">
      <div class="notepad-title">
        <svg class="notepad-minimize-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" title="Minimize">
          <rect x="4" y="3" width="16" height="18" rx="3"></rect>
          <path d="M8 8h8M8 12h8M8 16h5"></path>
        </svg>
      </div>
      <div class="notepad-actions">
        <button class="notepad-action-btn" id="toggleFocusNotepad" title="Focus Mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
            <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
            <path d="M3 17v2a2 2 0 0 1 2 2h2"></path>
          </svg>
        </button>
        <button class="notepad-action-btn destructive" id="clearNotepad" title="Erase all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l4.4 4.4c1 1 1 2.5 0 3.4L10.5 21z"></path>
            <path d="m22 21-14 0"></path>
            <path d="m18 11-4.4-4.4"></path>
          </svg>
        </button>
        <button class="notepad-action-btn close" id="minimizeNotepad" title="Minimize">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
    <textarea class="notepad-textarea" id="notepadTextarea" placeholder="Jot down your ideas here..."></textarea>
    <div id="notepadStatusToast" class="notepad-status-toast"></div>
    <div class="notepad-ai-bar" id="notepadAiBar">
      <input class="notepad-ai-input" id="notepadAiInput" type="text" placeholder="Ask anything" autocomplete="off">
      <button class="notepad-ai-submit" id="notepadAiSubmit" title="Send AI prompt" aria-label="Send AI prompt">
        <svg class="notepad-ai-send-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5"></path>
          <path d="m6 11 6-6 6 6"></path>
        </svg>
        <span class="notepad-ai-stop-icon" aria-hidden="true"></span>
      </button>
    </div>
    <div class="notepad-footer">
      <span id="notepadWordCount">0</span>
      <div class="notepad-footer-actions">
        <button class="notepad-footer-btn" id="toggleAiAssist" title="AI Assist">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 10.5 16.8 15 21.5 17 16.8 19 15 23 13.2 19 8.5 17 13.2 15 15 10.5z"></path>
            <path d="M7 1.5 8.1 4.4 11 5.5 8.1 6.6 7 9.5 5.9 6.6 3 5.5 5.9 4.4 7 1.5z"></path>
          </svg>
        </button>
        <button class="notepad-footer-btn" id="toggleVoiceNote" title="Voice-to-Text">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
        <button class="notepad-footer-btn" id="copyNotepad" title="Copy all text">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="notepad-edge n" data-edge="n"></div>
    <div class="notepad-edge e" data-edge="e"></div>
    <div class="notepad-edge s" data-edge="s"></div>
    <div class="notepad-edge w" data-edge="w"></div>
    <div class="notepad-edge nw" data-edge="nw"></div>
    <div class="notepad-edge ne" data-edge="ne"></div>
    <div class="notepad-edge sw" data-edge="sw"></div>
    <div class="notepad-edge se" data-edge="se"></div>
  </div>

  <!-- Floating Notepad Toggle -->
  <button class="floating-notepad-btn" id="restoreNotepadBtn" aria-label="Show Notepad" title="Show Notepad">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="16" height="18" rx="3"></rect>
      <path d="M8 8h8M8 12h8M8 16h5"></path>
    </svg>
  </button>

  <script>
    // Critical: Set initial notepad visibility instantly to prevent "flash" on refresh
    (function() {
      try {
        const minimizedPref = localStorage.getItem('toeicNotepadMinimized');
        const minimized = minimizedPref === null ? true : minimizedPref === 'true';
        if (minimized) {
          document.getElementById('notepadOverlay').classList.add('hidden');
          document.getElementById('restoreNotepadBtn').classList.add('show');
        }
      } catch (e) {}
    })();
  </script>

  <button class="bottom-recorder-handle" id="bottomRecorderHandle" aria-label="Show recording controls" title="Show recording controls"></button>
  <!-- Image Modal -->
  <div id="imageModal" class="image-modal" onclick="this.classList.remove('active')">
    <img id="imageModalContent" alt="Zoomed picture" onclick="event.stopPropagation()">
  </div>

  <!-- Save Modal -->
  <div id="saveModal" class="save-modal">
    <div class="save-modal-content">
      <h3>Rename Recording</h3>
      <div class="save-modal-input-wrapper">
        <input type="text" id="recordingFileName" placeholder="Enter filename...">
        <span id="recordingFileExtension">.mp4</span>
      </div>
      <div class="save-modal-actions">
        <button id="cancelSave" class="save-modal-btn cancel">Cancel</button>
        <button id="confirmSave" class="save-modal-btn confirm">Save</button>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=22"></script>
  <script src="js/sidebar.js?v=25"></script>
  <script src="js/timers.js?v=22"></script>
  <script src="js/audioPlayers.js?v=22"></script>
  <script src="js/partCard.js?v=31"></script>
  <script src="js/bottomNav.js?v=22"></script>
  <script src="js/layoutbtn.js?v=31"></script>
  <script src="js/core.js?v=23"></script>
  <script src="js/notepad.js?v=23"></script>
  <div class="notepad-backdrop" id="notepadBackdrop"></div>
</body>
</html>
